# Canonical tokenizer for prompt-shaping (used for ALL configs so every endpoint
# receives identical prompt text; each endpoint still reports its own token usage).
tokenizer_model: "Qwen/Qwen2.5-7B-Instruct"
endpoints:
  # Managed reference: Nebius Token Factory does not offer Qwen2.5-7B, so we use the
  # closest efficient instruct model (Qwen3-30B-A3B, MoE ~3B active). This makes the
  # managed comparison "self-hosted small quantized vs managed larger model" — a real
  # procurement question, not a same-model serving comparison (documented limitation).
  - {name: managed, base_url: "https://api.studio.nebius.ai/v1", model: "Qwen/Qwen3-30B-A3B-Instruct-2507", kind: managed, api_key_env: NEBIUS_API_KEY}
  # Self-host endpoints  — run_selfhost.py picks these up; run_managed.py
  # filters by kind so it ignores them. Start the matching vLLM server first.
  - {name: bf16, base_url: "http://localhost:8000/v1", model: "Qwen/Qwen2.5-7B-Instruct", kind: self_host}
  - {name: awq,  base_url: "http://localhost:8001/v1", model: "Qwen/Qwen2.5-7B-Instruct-AWQ", kind: self_host}
  - {name: gptq, base_url: "http://localhost:8002/v1", model: "Qwen/Qwen2.5-7B-Instruct-GPTQ-Int4", kind: self_host}
workloads: [chat, rag, summary]
concurrency: [1, 5, 20, 50]
warmup: 5
n: 50
seed: 1234
max_tokens: {chat: 100, rag: 300, summary: 500}
